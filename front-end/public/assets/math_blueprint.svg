<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint Grid -->
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Coordinate Axis -->
  <line x1="400" y1="0" x2="400" y2="600" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
  
  <!-- Geometric Construction (Triangle with Compass Arc) -->
  <path d="M 400 300 L 600 300 L 500 126.8 Z" stroke="rgba(147, 197, 253, 0.3)" stroke-width="2" fill="rgba(147, 197, 253, 0.05)" />
  <path d="M 500 300 A 100 100 0 0 0 450 213.4" stroke="rgba(244, 114, 182, 0.3)" stroke-width="1.5" fill="none" />
  <circle cx="400" cy="300" r="100" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="10 10" />

  <!-- Dimensions / Labels -->
  <text x="410" y="140" font-family="monospace" font-size="12" fill="rgba(255, 255, 255, 0.3)">60°</text>
  <text x="500" y="320" font-family="monospace" font-size="12" fill="rgba(255, 255, 255, 0.3)">r = 100</text>
  
  <!-- Technical Data Overlay -->
  <rect x="20" y="520" width="150" height="60" rx="5" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" fill="rgba(255, 255, 255, 0.02)" />
  <text x="30" y="540" font-family="monospace" font-size="10" fill="rgba(255, 255, 255, 0.2)">SCALE: 1:1</text>
  <text x="30" y="555" font-family="monospace" font-size="10" fill="rgba(255, 255, 255, 0.2)">COORD: CARTESIAN</text>
  <text x="30" y="570" font-family="monospace" font-size="10" fill="rgba(255, 255, 255, 0.2)">UNIT: PX</text>

  <!-- Floating Formulas -->
  <text x="650" y="550" font-family="serif" font-size="20" fill="rgba(255, 255, 255, 0.1)" font-style="italic">y = mx + b</text>
  <text x="50" y="50" font-family="serif" font-size="20" fill="rgba(255, 255, 255, 0.1)" font-style="italic">lim(x→∞)</text>
</svg>
